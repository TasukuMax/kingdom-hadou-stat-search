<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">キングダム覇道 攻略ツール集</title>
  <desc id="desc">戦力検索、武将DB、技能DB、ガチャシミュレーター、全鯖ランキングをまとめたサイト画像</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120e0a" />
      <stop offset="45%" stop-color="#291d14" />
      <stop offset="100%" stop-color="#3f2a1a" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,245,223,0.97)" />
      <stop offset="100%" stop-color="rgba(236,216,186,0.93)" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8d5e20" />
      <stop offset="50%" stop-color="#f0cf7f" />
      <stop offset="100%" stop-color="#9e6c29" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.28" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1020" cy="120" r="220" fill="rgba(252,207,114,0.18)" />
  <circle cx="180" cy="560" r="240" fill="rgba(188,113,42,0.18)" />
  <path d="M0 488C158 446 233 411 341 358C452 303 550 258 690 241C863 220 975 290 1200 225V630H0Z" fill="rgba(197,125,54,0.18)" />

  <g filter="url(#shadow)">
    <rect x="48" y="52" width="1104" height="526" rx="34" fill="url(#panel)" stroke="url(#gold)" stroke-width="4" />
    <rect x="72" y="78" width="1056" height="474" rx="28" fill="none" stroke="rgba(123,79,27,0.32)" stroke-width="2" />
  </g>

  <rect x="92" y="102" width="166" height="42" rx="21" fill="#2d4c65" />
  <text x="175" y="130" fill="#fef7ea" font-size="24" font-family="'Noto Sans JP', 'Yu Gothic UI', sans-serif" text-anchor="middle">非公式ツール</text>

  <text x="92" y="224" fill="#1f1712" font-size="68" font-weight="700" font-family="'Noto Serif JP', serif">キングダム覇道</text>
  <text x="92" y="312" fill="#7a4f1a" font-size="86" font-weight="800" font-family="'Noto Serif JP', serif">攻略ツール集</text>
  <text x="92" y="382" fill="#53463a" font-size="30" font-family="'Noto Sans JP', 'Yu Gothic UI', sans-serif">戦力検索・武将DB・技能DB・ガチャシミュレーター・全鯖ランキング</text>
  <text x="92" y="428" fill="#6a5a4d" font-size="24" font-family="'Noto Sans JP', 'Yu Gothic UI', sans-serif">キングダム覇道ユーザー向けに、必要な機能をすぐ使える形でまとめています。</text>

  <g transform="translate(90 470)">
    <rect width="214" height="52" rx="26" fill="#1a2632" />
    <text x="107" y="34" fill="#ffffff" font-size="24" font-family="'Noto Sans JP', 'Yu Gothic UI', sans-serif" text-anchor="middle">戦力検索</text>
  </g>
  <g transform="translate(324 470)">
    <rect width="214" height="52" rx="26" fill="#7f3d1f" />
    <text x="107" y="34" fill="#ffffff" font-size="24" font-family="'Noto Sans JP', 'Yu Gothic UI', sans-serif" text-anchor="middle">ガチャシミュ</text>
  </g>
  <g transform="translate(558 470)">
    <rect width="244" height="52" rx="26" fill="#295c53" />
    <text x="122" y="34" fill="#ffffff" font-size="24" font-family="'Noto Sans JP', 'Yu Gothic UI', sans-serif" text-anchor="middle">全鯖ランキング</text>
  </g>

  <g transform="translate(860 138)">
    <rect x="0" y="0" width="210" height="280" rx="26" fill="rgba(57,34,20,0.82)" stroke="url(#gold)" stroke-width="3" />
    <circle cx="105" cy="96" r="54" fill="rgba(240,204,126,0.24)" stroke="#efcf7f" stroke-width="3" />
    <path d="M105 56C128 56 145 73 145 96C145 108 140 118 132 126C124 134 121 141 121 150H89C89 141 86 134 78 126C70 118 65 108 65 96C65 73 82 56 105 56Z" fill="#efcf7f" />
    <rect x="32" y="174" width="146" height="18" rx="9" fill="rgba(255,255,255,0.12)" />
    <rect x="32" y="206" width="114" height="18" rx="9" fill="rgba(255,255,255,0.12)" />
    <rect x="32" y="238" width="82" height="18" rx="9" fill="rgba(255,255,255,0.12)" />
  </g>
</svg>
